name: ci

on:
  push:
    branches: [main]
  pull_request:

# 同一 PR/ブランチの古い実行はキャンセルし、push と pull_request の二重起動も防ぐ。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 時間の真実（状態機械）の単体テスト。webkit 不要。
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: crates/core -> target
          # PR/タグ実行では保存しない（Windows の post cache 保存フレーク回避）。
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test --manifest-path crates/core/Cargo.toml

  # フロント（SvelteKit SPA）の型チェックと静的ビルド。
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node tools/gen-assets.mjs
      - run: pnpm run check
      - run: pnpm run build

  # Tauri シェルのコンパイル検証（macOS / Windows は webkit 不要）。
  app-build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
          # PR/タグ実行では保存しない（Windows の post cache 保存フレーク回避）。
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: pnpm install --frozen-lockfile
      - run: node tools/gen-assets.mjs
      - run: pnpm tauri icon app-icon.png
      - run: pnpm run build
      - run: cargo build --manifest-path src-tauri/Cargo.toml

  # 依存の既知脆弱性チェック（Rust: RustSec / フロント: pnpm audit）。
  # フロントは配布物が静的ビルド済みアセットのため、本番に同梱される依存だけを
  # --prod でゲートする（dev サーバ専用の指摘で CI を赤くしない）。
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      # プリビルドの cargo-audit を取得（cargo install のコンパイル待ちを避ける）。
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: cargo-audit
      - name: cargo audit（アプリシェル）
        run: cargo audit --file src-tauri/Cargo.lock
      - name: cargo audit（コアクレート）
        run: cargo audit --file crates/core/Cargo.lock
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit（本番依存のみ）
        run: pnpm audit --prod
