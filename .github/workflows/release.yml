name: release

# バージョンタグ（v*）の push、または Actions 画面からの手動実行で
# 各OSインストーラをビルドし Release（ドラフト）へアップロードする。
on:
  push:
    tags:
      - 'v*'
  # タグを push せずに GitHub の Actions 画面からリリースを起動できる手動トリガ。
  # version にバージョン（例: v0.1.0）を入れると、実行したコミットにそのタグを作成する。
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースバージョン（例: v0.1.0）'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
          # タグ実行では保存しない（Windows の post cache 保存フレーク回避）。
          save-if: false

      - run: pnpm install --frozen-lockfile

      - name: アイコン生成
        run: |
          node tools/gen-assets.mjs
          pnpm tauri icon app-icon.png

      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 自動アップデート用の更新署名鍵（パスワードなしで生成済み）。
          # リポジトリ Settings → Secrets and variables → Actions に登録する。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # 鍵はパスワードなし。空文字を明示して CI の対話プロンプトを防ぐ。
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          # タグ push 時は github.ref_name、手動実行時は入力 version を使う。
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: '雨やどり ${{ github.event.inputs.version || github.ref_name }}'
          releaseDraft: true
          prerelease: false
          # 自動アップデートのマニフェスト latest.json を Release に同梱する。
          # matrix 各ジョブのプラットフォーム情報は同一 Release 上でマージされる。
          includeUpdaterJson: true
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

  # Tauri 既定のアセット名（x64-setup / aarch64 など）はどの OS 向けか分かりにくいため、
  # 全ジョブのアップロード完了後に OS が分かる名前へリネームし、latest.json の URL も追随させる。
  # latest.json は各ビルドジョブがマージしながら更新するので、build 全体の完了を待って 1 回だけ実行する。
  rename-assets:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: アセット名を分かりやすくリネーム
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tools/rename-release-assets.mjs --tag '${{ github.event.inputs.version || github.ref_name }}'
