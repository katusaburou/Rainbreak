name: release

# バージョンタグ（v*）の push、または Actions 画面からの手動実行で
# 各OSインストーラをビルドし Release（ドラフト）へアップロードする。
on:
  push:
    tags:
      - 'v*'
  # タグを push せずに GitHub の Actions 画面からリリースを起動できる手動トリガ。
  # version にバージョン（例: v0.1.0）を入れると、実行したコミットにそのタグを作成する。
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースバージョン（例: v0.1.0）'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          # タグ実行では保存しない（Windows の post cache 保存フレーク回避）。
          save-if: false

      - run: pnpm install --frozen-lockfile

      - name: アイコン生成
        run: |
          node tools/gen-assets.mjs
          pnpm tauri icon app-icon.png

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 自動アップデート用の更新署名鍵（パスワードなしで生成済み）。
          # リポジトリ Settings → Secrets and variables → Actions に登録する。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # 鍵はパスワードなし。空文字を明示して CI の対話プロンプトを防ぐ。
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          # タグ push 時は github.ref_name、手動実行時は入力 version を使う。
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: '雨やどり ${{ github.event.inputs.version || github.ref_name }}'
          releaseDraft: true
          prerelease: false
          # 自動アップデートのマニフェスト latest.json を Release に同梱する。
          # matrix 各ジョブのプラットフォーム情報は同一 Release 上でマージされる。
          includeUpdaterJson: true
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
